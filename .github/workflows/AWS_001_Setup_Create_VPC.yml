name: AWS_001_Setup_Create_VPC

on:
  workflow_dispatch:
    inputs:
      aws_region: { required: false, default: us-east-1, type: string }
      vpc_cidr: { required: false, default: "10.0.0.0/16", type: string }
      env_name: { required: false, default: dev, type: string }
  workflow_call:
    inputs:
      aws_region: { required: false, default: us-east-1, type: string }
      vpc_cidr: { required: false, default: "10.0.0.0/16", type: string }
      env_name: { required: false, default: dev, type: string }
    secrets:
      AWS_ACCESS_KEY_ID: { required: true }
      AWS_SECRET_ACCESS_KEY: { required: true }

jobs:
  create-vpc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Create VPC + subnets + IGW + NAT
        run: |
          set -e
          PREFIX="ihcp-${{ inputs.env_name }}"

          # VPC
          VPC_ID=$(aws ec2 create-vpc \
            --cidr-block "${{ inputs.vpc_cidr }}" \
            --tag-specifications "ResourceType=vpc,Tags=[{Key=Name,Value=${PREFIX}-vpc},{Key=Project,Value=in-home-care-platform},{Key=Env,Value=${{ inputs.env_name }}}]" \
            --query 'Vpc.VpcId' --output text 2>/dev/null || \
            aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${PREFIX}-vpc" --query 'Vpcs[0].VpcId' --output text)
          echo "VPC_ID=$VPC_ID"
          aws ec2 modify-vpc-attribute --vpc-id "$VPC_ID" --enable-dns-support
          aws ec2 modify-vpc-attribute --vpc-id "$VPC_ID" --enable-dns-hostnames

          # Public subnets (2 AZs)
          for i in 1 2; do
            AZ="${{ inputs.aws_region }}$(echo $i | tr '12' 'ab')"
            CIDR="10.0.$((i*10)).0/24"
            aws ec2 create-subnet --vpc-id "$VPC_ID" --cidr-block "$CIDR" --availability-zone "$AZ" \
              --tag-specifications "ResourceType=subnet,Tags=[{Key=Name,Value=${PREFIX}-public-$i},{Key=Tier,Value=public}]" 2>/dev/null || true
          done

          # Private subnets (2 AZs)
          for i in 1 2; do
            AZ="${{ inputs.aws_region }}$(echo $i | tr '12' 'ab')"
            CIDR="10.0.$((i*10+100)).0/24"
            aws ec2 create-subnet --vpc-id "$VPC_ID" --cidr-block "$CIDR" --availability-zone "$AZ" \
              --tag-specifications "ResourceType=subnet,Tags=[{Key=Name,Value=${PREFIX}-private-$i},{Key=Tier,Value=private}]" 2>/dev/null || true
          done

          # Internet Gateway
          IGW_ID=$(aws ec2 create-internet-gateway \
            --tag-specifications "ResourceType=internet-gateway,Tags=[{Key=Name,Value=${PREFIX}-igw}]" \
            --query 'InternetGateway.InternetGatewayId' --output text 2>/dev/null || \
            aws ec2 describe-internet-gateways --filters "Name=tag:Name,Values=${PREFIX}-igw" --query 'InternetGateways[0].InternetGatewayId' --output text)
          aws ec2 attach-internet-gateway --vpc-id "$VPC_ID" --internet-gateway-id "$IGW_ID" 2>/dev/null || true

          echo "VPC=$VPC_ID IGW=$IGW_ID — done"
