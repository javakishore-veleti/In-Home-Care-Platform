services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: in-home-care-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      # Host port 9092 -> container 9092: host clients (the python
      # middleware running on the host machine) connect via localhost:9092.
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Dual-listener setup so two very different client populations can
      # both reach the broker:
      #
      #   PLAINTEXT_HOST   (port 9092)  — host-side clients (the Python
      #                                   middleware running outside
      #                                   docker) connect via
      #                                   localhost:9092.
      #   PLAINTEXT_DOCKER (port 29092) — in-docker clients (kafka-ui,
      #                                   future consumers running in
      #                                   compose) connect via
      #                                   kafka:29092 — that hostname
      #                                   only resolves on the shared
      #                                   in-home-care-network.
      #
      # Without this split, kafka-ui would bootstrap on
      # host.docker.internal:9092, then receive `localhost:9092` as the
      # advertised address from broker metadata, then fail to reconnect
      # because `localhost` inside the kafka-ui container is the
      # container's own loopback.
      #
      # We use empty bind hosts (`PLAINTEXT_HOST://:9092`) instead of the
      # literal `0.0.0.0` because apache/kafka:3.9.0's storage-format
      # step rejects 0.0.0.0 as a meta-address.
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT_DOCKER://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT_DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Inter-broker traffic uses the docker-internal listener so the
      # broker does not try to reach itself via host networking.
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "in-home-care-local-cluster"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - in-home-care-network
volumes:
  kafka-data:

networks:
  in-home-care-network:
    external: true
