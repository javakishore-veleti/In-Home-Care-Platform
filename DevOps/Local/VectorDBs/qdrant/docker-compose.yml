services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: in-home-care-vec-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
volumes:
  qdrant-data:

networks:
  in-home-care-network:
    external: true
