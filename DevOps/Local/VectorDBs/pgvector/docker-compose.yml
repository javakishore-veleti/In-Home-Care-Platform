services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: in-home-care-vec-pgvector
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: care
      POSTGRES_PASSWORD: care
      POSTGRES_DB: care_vectors
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care -d care_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgvector-data:

networks:
  in-home-care-network:
    external: true
