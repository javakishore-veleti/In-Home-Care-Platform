services:
  postgres:
    image: postgres:16
    container_name: ihcp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: care
      POSTGRES_PASSWORD: care
      POSTGRES_DB: in_home_care
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care -d in_home_care"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres-data:
