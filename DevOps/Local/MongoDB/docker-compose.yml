services:
  mongodb:
    image: mongo:7.0
    container_name: in-home-care-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: care
      MONGO_INITDB_ROOT_PASSWORD: care
      MONGO_INITDB_DATABASE: in_home_care
    volumes:
      - mongodb-data:/data/db
volumes:
  mongodb-data:

networks:
  in-home-care-network:
    external: true
